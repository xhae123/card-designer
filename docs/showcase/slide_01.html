<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1080px; overflow: hidden; }

.slide {
  width: 1080px; height: 1080px;
  position: relative;
  font-family: 'Pretendard', sans-serif;
  word-break: keep-all;
  background: #0F172A;
  color: #F8FAFC;
}
.content {
  position: absolute;
  top: 50%; left: 80px; right: 80px;
  transform: translateY(-50%);
}

/* Decorative grid */
.grid-decoration {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  opacity: 0.04;
  background-image:
    linear-gradient(rgba(59,130,246,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
}

.label {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #3B82F6;
  margin-bottom: 48px;
}
.title {
  font-family: 'Space Grotesk', 'Pretendard', sans-serif;
  font-size: 82px;
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -3px;
  margin-bottom: 40px;
}
.title em {
  font-style: normal;
  color: #3B82F6;
}
.subtitle {
  font-size: 22px;
  font-weight: 300;
  line-height: 1.6;
  color: rgba(248,250,252,0.5);
  max-width: 560px;
}

/* Accent bar */
.accent-bar {
  width: 64px;
  height: 4px;
  background: #3B82F6;
  margin-bottom: 48px;
  border-radius: 2px;
}

.page-number { position: absolute; bottom: 40px; right: 80px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.3); }
.bottom-accent { position: absolute; bottom: 76px; left: 80px; width: 40px; height: 2px; background: #3B82F6; opacity: 0.4; }
</style>
</head>
<body>
<div class="slide">
  <div class="grid-decoration"></div>
  <div class="content">
    <div class="label">The Future of Development</div>
    <div class="accent-bar"></div>
    <div class="title">How AI Is<br>Changing the<br>Way We <em>Code</em></div>
    <div class="subtitle">From autocomplete to autonomous agents — the developer workflow will never be the same.</div>
  </div>
  <div class="bottom-accent"></div>
  <div class="page-number">01 / 05</div>
</div>
</body>
</html>
