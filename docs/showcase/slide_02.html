<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1080px; overflow: hidden; }

.slide {
  width: 1080px; height: 1080px;
  position: relative;
  font-family: 'Pretendard', sans-serif;
  word-break: keep-all;
  background: #0F172A;
  color: #F8FAFC;
}
.content {
  position: absolute;
  top: 50%; left: 80px; right: 80px;
  transform: translateY(-50%);
  text-align: center;
}

.context {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #3B82F6;
  margin-bottom: 56px;
}
.hero-number {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 220px;
  font-weight: 700;
  line-height: 0.85;
  letter-spacing: -10px;
  margin-bottom: 12px;
  background: linear-gradient(180deg, #F8FAFC 30%, rgba(59,130,246,0.6) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.hero-unit {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 48px;
  font-weight: 500;
  letter-spacing: -1px;
  color: rgba(248,250,252,0.4);
  margin-bottom: 64px;
}
.description {
  font-size: 20px;
  font-weight: 400;
  line-height: 1.7;
  color: rgba(248,250,252,0.5);
  max-width: 640px;
  margin: 0 auto;
}

/* SVG glow behind number */
.glow-ring {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 600px; height: 600px;
  opacity: 0.08;
}

.page-number { position: absolute; bottom: 40px; right: 80px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.3); }
.bottom-accent { position: absolute; bottom: 76px; left: 80px; width: 40px; height: 2px; background: #3B82F6; opacity: 0.4; }
</style>
</head>
<body>
<div class="slide">
  <svg class="glow-ring" viewBox="0 0 600 600">
    <circle cx="300" cy="300" r="250" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
    <circle cx="300" cy="300" r="200" fill="none" stroke="#3B82F6" stroke-width="0.8"/>
    <circle cx="300" cy="300" r="150" fill="none" stroke="#3B82F6" stroke-width="0.4"/>
  </svg>
  <div class="content">
    <div class="context">GitHub Copilot Survey 2025</div>
    <div class="hero-number">92%</div>
    <div class="hero-unit">of developers</div>
    <div class="description">now use AI-assisted coding tools at work.<br>Up from 38% just two years ago.</div>
  </div>
  <div class="bottom-accent"></div>
  <div class="page-number">02 / 05</div>
</div>
</body>
</html>
